# Stage 2 anchor safety repair.
#
# tailchase_s2_anchor_reward_sac_v2 learned strong WEZ/kill contact but lost
# altitude during deterministic eval. This continuation starts from its best
# attack bundle and strengthens altitude/action safety without changing the
# straight-BT tail-chase objective.

name: tailchase_s2_anchor_safety_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s2_anchor_safety_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage2_anchor
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.10
  action_abs_limit: [0.48, 0.30, 0.38, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 6.0
      el_ref_deg: 5.0
      roll_gain: 0.28
      rudder_gain: 0.44
      pitch_gain: 0.16
      max_delta: 0.28
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 12.0
      roll_gain: 0.09
      pull_gain: 0.05
    range_assist:
      enabled: true
      target_m: 700.0
      band_m: 380.0
      throttle_gain: 0.30
      min_throttle_action: -0.15
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 4200.0
      safe_m: 6000.0
      pitch_up_gain: 0.65
      nose_down_deg: 4.0
      nose_down_pitch_gain: 0.55
      roll_level_gain: 0.50
      roll_ref_deg: 75.0
      min_throttle_action: 0.65
  offensive_saddle:
    enabled: true
    range_m: [520.0, 860.0]
    aspect_deg: [0.0, 7.0]
    altitude_m: 7600.0
    target_speed_mps: 250.0
    own_speed_mps: 262.0
  range_discipline:
    enabled: true
    max_range_m: 3600.0
    grow_steps: 55
  wez:
    angle_deg: 10.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    altitude_target_m: 7600.0
    altitude_band_m: 2200.0
    safe_altitude_m: 5200.0
    altitude_hold_scale: 0.35
    low_altitude_guard_scale: 8.0
    attitude_envelope_guard_scale: 0.85
    pitch_envelope_ref_deg: 22.0
    roll_envelope_ref_deg: 75.0
    nose_down_guard_scale: 3.0
    nose_down_pitch_ref_deg: 9.0
    descent_rate_guard_scale: 2.8
    descent_rate_ref_mps: 32.0
    low_altitude_roll_guard_scale: 1.6
    action_pitch_down_guard_scale: 4.0
    action_pitch_guard_scale: 0.35
    action_roll_guard_scale: 0.35
    action_roll_global_guard_scale: 0.08
    speed_penalty_scale: 0.10
    speed_target_kcas: 320.0
    speed_band_kcas: 170.0
    track_angle_scale: 0.95
    relative_position_scale: 1.80
    closure_scale: 0.35
    gunsnap_blue_scale: 0.80
    too_close_scale: 1.80
    damage_scale: 25.0
    wez_band_scale: 1.50
    wez_band_center_m: 700.0
    wez_band_half_width_m: 430.0
    wez_nose_half_angle_deg: 16.0
    wez_hold_bonus: 0.65
    official_wez_aim_scale: 2.00
    official_wez_aim_half_angle_deg: 12.0
    precision_aim_scale: 0.80
    precision_aim_sigma_deg: 9.0
    anchor_range_center_m: 700.0
    anchor_range_half_width_m: 430.0
    anchor_nose_sigma_deg: 18.0
    anchor_rear_min_deg: 115.0
    anchor_nose_scale: 1.20
    anchor_rear_scale: 1.00
    anchor_saddle_scale: 2.80
    anchor_terminal_scale: 8.0
    anchor_bad_geometry_scale: 0.50

algo:
  name: sac
  framework: torch
  lr: 5.0e-5
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 70000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 40
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s2_anchor_reward_sac_v2/bundle_000040

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 2 safety repair: continue attack-capable v2 bundle with stronger altitude/action guards, lower LR, and no extra BT engagement-log env."
