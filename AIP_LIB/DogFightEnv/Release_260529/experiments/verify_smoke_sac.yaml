# Minimal smoke-test experiment used to verify the installation end-to-end.
# 2 iterations, SAC vs BT target, bundle + checkpoint saving enabled.
#   python scripts\run_experiment.py experiments\verify_smoke_sac.yaml

name: verify_smoke_sac
script: train_rllib

output:
  name: verify
  tag: smoke_sac

env:
  observation_mode: tactical16
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 60.0
  episode_step_limit: 3600

env_config:
  step_ratio: 6

algo:
  name: sac
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 10000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu

runtime:
  iterations: 2
  num_env_runners: 1
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 1
  save_native_checkpoint: false

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Installation smoke test - 2 SAC iterations vs BT target."
