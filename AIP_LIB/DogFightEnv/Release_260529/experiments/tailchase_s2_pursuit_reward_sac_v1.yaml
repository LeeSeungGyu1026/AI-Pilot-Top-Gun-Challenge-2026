# Stage 2 reward line: stable pursuit geometry.
#
# Continue from Stage 1. The reward module now emphasizes rear-aspect pursuit,
# range control, and a wide training WEZ while retaining altitude guards.
#
# Run:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\run_experiment.py experiments\tailchase_s2_pursuit_reward_sac_v1.yaml
# Analyze:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\analyze_tailchase_run.py tailchase_s2_pursuit_reward_sac_v1 --report artifacts\reports\team01\tailchase_s2_pursuit_reward_sac_v1\analysis.md

name: tailchase_s2_pursuit_reward_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s2_pursuit_reward_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage2_pursuit
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.15
  action_abs_limit: [0.58, 0.42, 0.42, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 6.0
      el_ref_deg: 5.0
      roll_gain: 0.28
      rudder_gain: 0.40
      pitch_gain: 0.26
      max_delta: 0.32
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 12.0
      roll_gain: 0.09
      pull_gain: 0.035
    range_assist:
      enabled: true
      target_m: 640.0
      band_m: 340.0
      throttle_gain: 0.26
      min_throttle_action: -0.15
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 3000.0
      safe_m: 4400.0
      pitch_up_gain: 0.34
      nose_down_deg: 7.0
      nose_down_pitch_gain: 0.24
      roll_level_gain: 0.28
      roll_ref_deg: 85.0
      min_throttle_action: 0.50
  offensive_saddle:
    enabled: true
    range_m: [500.0, 850.0]
    aspect_deg: [0.0, 10.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 265.0
  range_discipline:
    enabled: true
    max_range_m: 3500.0
    grow_steps: 50
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4

algo:
  name: sac
  framework: torch
  lr: 2.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 60000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 120
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s1_survival_reward_sac_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 2 reward line: continue Stage 1 reward policy, learn rear-aspect pursuit and range control before kill pressure."
