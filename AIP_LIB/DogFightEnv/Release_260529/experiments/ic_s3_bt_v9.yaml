# IC curriculum S3 v9 — decouple the shaping cone from the real kill cone
# (user request). NOT YET LAUNCHED -- prepared and dry-run only, per
# instruction to report the design before starting training.
#
# v8's approach (widen wez.angle_deg itself, 8->16) was flagged by the user
# as the wrong lever: angle_deg is the REAL, symmetric damage/kill model, so
# widening it changes what counts as a hit for BOTH aircraft, not just makes
# it easier for the RL to learn. User's correction:
#   - wez.angle_deg (the BT's/the actual kill criteria) stays at the platform
#     DEFAULT, 2.0 deg (src/dogfight/config.py) -- reverted from v8's 16.0.
#   - The RL's reward shaping gets a separate, much WIDER cone (45 deg) that
#     ONLY affects the reward signal, never the real kill/damage math.
#   - Reward inside that wide cone scales CONTINUOUSLY with aim precision
#     (peaks dead-on, ramps to 0 at the cone edge) rather than being a flat
#     bonus for merely being inside some fixed window.
#
# Implemented in student/my_reward.py (new function _wez_precision_bonus,
# replacing v8's flat wez_step_bonus): active whenever inside the TRUE WEZ
# range band (min/max range_m, unchanged) AND inside
# reward.wez_shaping_cone_deg (45.0, reward-only) -- NOT gated by the true
# wez.angle_deg (2.0). Per user direction (revised after first draft): pays
# wez_precision_bonus_min (30) the instant aim is anywhere inside the wide
# 45deg cone, rising LINEARLY to wez_precision_bonus_max (60) at ata=0
# (dead-on), 0 outside the cone. Unit-verified: ata=0 -> 60.0, ata=11.25deg
# (midpoint) -> 45.0, ata=22.5deg (cone edge) -> 30.0, ata=22.51deg -> 0.0,
# out-of-range -> 0.0. The actual win/loss/damage model is completely
# untouched -- only wez_config["angle_deg"] (still 2.0) is ever used for that.
# NOTE: at 30-60/step, sustained cone time can outweigh a single win_reward
# (150) over just a few steps -- intentional (make precision unmistakably
# worth pursuing), but watch for a new "hold the wide cone" attractor.
#
# Everything else kept from v8 (damage_dealt_scale=60, damage_taken_scale=6,
# pursuit_dense_scale=0.2, max_engage_time=180s, 3600-4200m spawn).
#
# Seed: v7's bundle_000030 (same as v8) -- v8's own progress is under a now-
# superseded wez.angle_deg=16 regime, so this branches from the same known
# point v8 started from rather than building on v8's partial (differently-
# shaped) results. Revisit once v8's outcome (still running as of writing)
# is known, in case its bundle is worth using instead.
#
#   python scripts\run_experiment.py experiments\ic_s3_bt_v9.yaml

name: ic_s3_bt_v9
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v9

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 180.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [3600.0, 4200.0]
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:
    enabled: true
    max_range_m: 7000.0
    grow_steps: 30
  target_weave:
    enabled: false
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 2.0                    # --- reverted in v9: was 16.0 in v8, back to platform default ---
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    forced_ground_reward: 50.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 60.0          # kept from v7/v8
    damage_taken_scale: 6.0           # kept from v8
    wez_entry_bonus: 20.0
    wez_shaping_cone_deg: 45.0        # --- NEW in v9 (replaces v8's wez_step_bonus) ---
    wez_precision_bonus_min: 30.0     # --- NEW in v9: value at the 45deg cone's edge ---
    wez_precision_bonus_max: 60.0     # --- NEW in v9: value at dead-on aim (ata=0) ---
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.2          # kept from v6/v7/v8
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.3
    rear_cone_reward_scale: 0.3
    critical_alt_margin_m: 100.0
    altitude_floor_penalty_scale: 25.0
    altitude_floor_penalty_exponent: 2.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Seed from v7's iter-30 bundle (same starting point as v8) -- see header
  # for why this branches from v7, not v8.
  init_bundle: artifacts/models/team01/ic_s3_bt_v7/bundle_000030

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 1800
  episodes: 1
  print: false

notes: "IC S3 v9: decouple shaping from the real kill cone -- wez.angle_deg reverted to platform default 2.0 (real kill/damage criteria, symmetric, unchanged), new reward.wez_shaping_cone_deg=45.0 + wez_precision_bonus_min=30/max=60 give a strong, reward-only per-step aim-precision bonus (30 anywhere in the 45deg cone, linearly up to 60 dead-on) that never affects actual win/loss. Replaces v8's flat wez_step_bonus and its symmetric-affecting wez.angle_deg=16 widening."
