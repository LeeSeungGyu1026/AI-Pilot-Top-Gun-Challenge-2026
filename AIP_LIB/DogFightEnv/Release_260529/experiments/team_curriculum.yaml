# Team curriculum run: metric-gated stages + dense-pursuit anneal + WEZ-width
# schedule (see student/my_curriculum.py for the per-stage table).
#
# dry-run:
#   python scripts\run_experiment.py experiments\team_curriculum.yaml --dry-run
# run:
#   python scripts\run_experiment.py experiments\team_curriculum.yaml
# resume after interruption (uses curriculum_state.json):
#   add  runtime.resume: true  below, or run train_curriculum.py --resume directly.
#
# NOTE (platform behavior): train_curriculum.py does NOT merge this file's
# env_config section — reward values come from student/my_reward.py's
# MY_REWARD_CONFIG plus per-stage reward_overrides in the stages module.
# Stage length is metric-gated (advance_conditions), not runtime.iterations.
#
# Outputs: artifacts/curriculum/<name>/<tag>/ (stage checkpoints, bundles,
# curriculum_state.json, training_log.csv).

name: team_curriculum
script: train_curriculum

output:
  name: team01
  tag: curr_dense02_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_behavior_dll: AIP_BASE_target.dll

curriculum:
  stages_module: student.my_curriculum   # dense cap 0.2; _dense01 variant = 0.1

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384   # 2x: more episodes/update -> stabler gradients, fewer NaN-metric iters
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  num_env_runners: 3   # 2 parallel sweep arms x (3 runners + learner) fits 16 threads
  # Fresh run from stage 0. (The earlier resume recovery is retired: the
  # train_batch_size change below is incompatible with resuming an old run,
  # and we are intentionally discarding the previous corrupted curriculum —
  # arm 1 had spuriously advanced on NaN metrics. run_parallel auto-archives
  # the old state dirs at launch.)
  resume: false

policy_probe:
  enabled: false

engagement_log:
  enabled: true        # periodic Tacview replays per stage for the Replay tab
  interval: 25
  steps: 600
  episodes: 1
  print: false

notes: "Curriculum: dense pursuit anneal + WEZ 8->5->3->2 deg schedule, PBRS always on, PPO tgc26."
