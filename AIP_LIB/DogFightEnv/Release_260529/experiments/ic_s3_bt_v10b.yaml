# IC curriculum S3 v10b — resume of v10 after a user-requested pause
# (laptop shutdown for power). Stopped cleanly at iter 63/150.
#
# No new experimental variable -- identical reward/env config to v10
# (90deg wide shaping cone, exponential precision bonus 1->100, exponential
# altitude bumper -1@600m->-1000@300m, true kill cone wez.angle_deg=2.0
# unchanged). Only change: init_bundle now points at v10's own
# bundle_000060 (the last saved checkpoint before the pause) instead of
# v9b's bundle_000040.
#
# Status at the pause point (see AUTONOMOUS_RUN_LOG.md for full detail):
# crash_rate had come down from the inherited v9b diving habit (0.68-1.0
# early) to a noisy 0.45-0.63 by iter 59-63, after dipping as low as
# 0.125-0.2 around iter 33-36 -- unclear if the late uptick is a real
# reversal or just noise; this run will clarify that. ep_min_distance
# oscillating 1000-1800m (still engaging). No wins yet, no repeat of the
# v9b farming exploit (no reward_mean spikes into the hundreds).
#
# Same caveat as every prior bundle-seeded restart: no live pause/suspend
# exists on this platform (save_native_checkpoint stayed false), so this is
# a fresh optimizer state seeded from saved weights, not a true resume --
# expect another brief re-seed disruption.
#
#   python scripts\run_experiment.py experiments\ic_s3_bt_v10b.yaml

name: ic_s3_bt_v10b
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v10b

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 180.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [3600.0, 4200.0]
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:
    enabled: true
    max_range_m: 7000.0
    grow_steps: 30
  target_weave:
    enabled: false
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 2.0                    # true kill cone, platform default, unchanged
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    forced_ground_reward: 50.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 60.0
    damage_taken_scale: 6.0
    wez_entry_bonus: 20.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 1.0
    wez_precision_bonus_max: 100.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.2
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.3
    rear_cone_reward_scale: 0.3
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Resume from v10's own last checkpoint (iter 60) before the pause, not v9b.
  init_bundle: artifacts/models/team01/ic_s3_bt_v10/bundle_000060

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 1800
  episodes: 1
  print: false

notes: "IC S3 v10b: resume of v10 after a user-requested pause (laptop shutdown, stopped cleanly at iter 63/150). No new variable -- same config as v10, just init_bundle repointed to v10's own bundle_000060 instead of v9b's bundle_000040."
