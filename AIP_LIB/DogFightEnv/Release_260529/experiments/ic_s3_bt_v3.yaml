# IC curriculum S3 v3 — same as v2 (reward fix: aspect-cone shaping + altitude-
# floor bumper), PLUS a BT-side fix: TacticalTasks.cpp SetCommand() now hard-
# clamps every commanded waypoint's Z to >= 900m (see kHardAltitudeFloor).
#
# Investigation (2026-07-03, ic_s3_bt_v2 in-progress log): BT already had THREE
# layers of altitude protection (tree-level DECO_AltitudeCheck<900>-> ClimbRecover
# at the Fallback's top priority; a bias flip inside DefensiveBreak/RearThreatJink
# below 1400m; an explicit floor clamp to >=1600m inside those same tasks below
# 1200m) -- yet "target altitude below min" (BT crashing itself) still accounted
# for ~18% of terminations early in v2 (176/967), because all of that logic only
# changes what WAYPOINT a task aims for; a fast, high-energy defensive dive
# entered right at episode start (the offensive_saddle spawn puts the RL locked
# on at BT's six from step 0, forcing RearThreatJink almost immediately) can
# physically out-run a reactive per-tick correction before JSBSim arrests the
# descent -- the same class of momentum problem the RL ownship itself had.
#
# Fix: SetCommand() is the single chokepoint every BT task (offensive and
# defensive) funnels its computed waypoint through, so clamping the commanded Z
# there closes the loop globally in one place: no task can ever aim the aircraft
# below 900m in the first place, regardless of which maneuver is running.
# Rebuilt via MSBuild (Debug|x64, AIP_DCS.sln) -> AIP_LIB/bin/debug.x64/AIP_DCS.dll
# -> copied to Release_260529/AIP_BASE_target.dll (old one backed up as
# AIP_BASE_target_pre_hardfloor900_20260703_034124.dll). Smoke-tested via
# run_local_dogfight.py (bt vs bt, 1500 steps): loads cleanly, no crash.
#
# env_config is otherwise byte-identical to ic_s3_bt_v2.yaml and seeds from the
# same base (ic_s2_sep1450_v1), so this isolates the BT-floor fix as the only
# new variable vs v2. Watch: "target altitude below min" share of terminations
# should drop sharply vs v2's early ~18%.
#
#   python scripts\run_experiment.py experiments\ic_s3_bt_v3.yaml

name: ic_s3_bt_v3
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v3

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 90.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [1100.0, 1450.0]       # competition range; agent starts locked-on behind the BT
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:                 # keep the proven exploit-blocker / aggression pressure
    enabled: true
    max_range_m: 2500.0
    grow_steps: 30
  target_weave:
    enabled: false                  # inert vs BT anyway (only fires when target_mode==autopilot)
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:                 # inert under behavior_tree; kept for config completeness
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 8.0                  # keep WIDE shaping cone (narrowing collapsed the policy before)
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 30.0
    damage_taken_scale: 12.0
    wez_entry_bonus: 20.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.1
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.3
    rear_cone_reward_scale: 0.3
    critical_alt_margin_m: 100.0
    altitude_floor_penalty_scale: 25.0
    altitude_floor_penalty_exponent: 2.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 100
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Seed from the SAME base as v1/v2 (separation champion), so the BT-floor fix
  # is the only new variable vs v2.
  init_bundle: artifacts/models/team01/ic_s2_sep1450_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 900
  episodes: 1
  print: false

notes: "IC S3 v3: same as v2 (reward fix), plus BT-side fix -- SetCommand() hard-clamps every commanded waypoint to >=900m altitude so evasive maneuvers can no longer dive the BT into the ground."
