# ic_s7 PYTHON-BT curriculum, STAGE 1: turn-rate 3 deg/s, rear-saddle spawn.
#
# The DLL-BT line (ic_s6 v1-v6) ended at 0 wins: the closed DLL's task->control
# loop suicide-dives under close-range pressure (64.5% of v6 episodes ended
# "target altitude below min"), so 99.8% of episodes paid <=0 reward and PPO
# learned loss-avoidance. Replaced by the wrapper's Python BT (target_bt on the
# autopilot backend, 2026-07-05): lead-pursuit ATTACK + saddled-threat EVADE
# with jink, SHOOTS via the backend-symmetric damage model, and CANNOT hit the
# ground (altitude command hard-clamped >=3000m). Difficulty is ONE number:
# target_bt.max_turn_rate_deg_s. Ladder = 3 -> 5 -> 8 deg/s, then narrow the
# damage cone 8 -> 4 -> 2 deg. Verified in scripts/smoke_python_bt_target.py
# (7/7: attacks, evades, guns own_hp 1.00->0.85, zero self-crash).
#
# Because no tick-0 dive exists anymore, the MASTERED rear saddle (500-900m)
# is safe again -- the June "spawn out to 3600m" workaround is dead, and the
# only new variable vs the conquered ic_s5 random-jinker is "the opponent
# reacts and shoots back".
#
# Anti-forgetting / anti-collapse: target_bt.prob 0.75 -> 25% of episodes fall
# through to the ic_s5 random-jink autopilot (straight_prob 0.1 inside those),
# so every PPO batch contains winnable episodes and the value function keeps a
# positive anchor (the all-BT ic_s6 batches had ZERO wins to learn from).
#
#   python scripts\run_experiment.py experiments\ic_s7_pybt1_turn3_v1.yaml
#
# Gate to stage 2 (turn rate 5): train win >=0.8 sustained AND
# end_condition_breakdown shows real "target destroyed" dominating; also spot
# a jink-only eval for forgetting. NOTE: run_eval --target-backend bt is NOT
# the held-out path for this opponent (no DLL involved); held-out eval = same
# yaml at 300s timing (run_eval --experiment-yaml this --target-backend
# autopilot keeps target_bt active since it lives in env_config).

name: ic_s7_pybt1_turn3_v1
script: train_rllib

output:
  name: team01
  tag: ic_s7_pybt1_turn3_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.codex_reward_v15_wez_only
  target_mode: autopilot            # Python BT drives the autopilot; no BT DLL
  max_engage_time: 120.0            # a reacting opponent takes longer than the jinker
  episode_step_limit: 3600

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [500.0, 900.0]         # the mastered band; safe again (no dive trigger)
    aspect_deg: [0.0, 25.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 260.0            # ic_s5 champion's regime; 300 caused the v5 overshoot
  range_discipline:
    enabled: true
    max_range_m: 3500.0             # close-saddle value (ic_s5); BT evade tops out ~290 m/s
    grow_steps: 30                  # so a fleeing BT cannot outrun a committed chase
  altitude_discipline:
    enabled: true                   # backstop for the agent's own dive-chase; the BT
    floor_m: 1200.0                 # itself cannot go below its 3000m command clamp
    sustain_steps: 5
  target_bt:                        # === the Python BT opponent ===
    enabled: true
    prob: 1.0                      # EVAL: BT-only (no jink mix) to isolate BT performance
    max_turn_rate_deg_s: 3.0        # STAGE 1 difficulty. Ladder: 3 -> 5 -> 8
    max_climb_rate_mps: 40.0
    min_altitude_m: 3000.0          # ground impact structurally impossible
    max_altitude_m: 11000.0
    threat_range_m: 1500.0
    threat_rear_deg: 90.0
    threat_track_deg: 40.0
    evade_enabled: true
    break_angle_deg: 100.0
    jink_min_steps: 25
    jink_max_steps: 70
    evade_vertical_m: 500.0
    lead_time_s: 3.0
    speed_attack_mps: 260.0
    speed_evade_mps: 270.0          # clamped <=290 in-wrapper (unreachable speed cmd
                                    # = autopilot trades ~3km altitude for airspeed)
    command_lead_max_deg: 45.0
    mode_min_steps: 20
  target_weave:                     # the 25% non-BT episodes: ic_s5 random jinker
    enabled: true
    random_jink: true
    hdg_rate_min_deg: 2.0
    hdg_rate_max_deg: 10.0
    vert_rate_min_m: 4.0
    vert_rate_max_m: 20.0
    switch_min_steps: 20
    switch_max_steps: 90
    vertical_dev_max_m: 1200.0
    straight_prob: 0.1
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 8.0                  # bootstrap cone vs a reactive target (v5 rationale);
    min_range_m: 152.4              # narrow 8 -> 4 -> 2 in later ic_s7 stages once
    max_range_m: 914.4              # kills are established
  reward:                           # exploit-free v15 block + v6 farm-safe dense tracking
    win_reward: 220.0
    forced_ground_reward: 0.0       # moot: the Python BT cannot reach the ground
    loss_reward: -150.0
    draw_reward: -100.0
    damage_dealt_scale: 350.0
    damage_taken_scale: 3.0         # keep low until kills are established (v7 lesson)
    wez_entry_bonus: 0.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 0.0
    wez_precision_bonus_max: 0.0
    fast_kill_bonus_max: 110.0
    fast_kill_horizon_s: 120.0
    fast_kill_bonus_floor_frac: 0.2
    pbrs_gamma: 0.997
    pbrs_ata_weight: 4.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.15       # v6 gates: gun-solution envelope only, farm-safe
    pursuit_half_angle_deg: 20.0
    pursuit_range_m: 1200.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.1
    rear_cone_reward_scale: 0.0
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0
    reward_output_scale: 0.05

algo:
  name: ppo
  framework: torch
  lr: 3.0e-5
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.08
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  init_bundle: artifacts/models/team01/ic_s5_weave5_random_v1/bundle_000150

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 5
  steps: 1200
  episodes: 1
  print: false

notes: "ic_s7 PYTHON-BT STAGE 1 (turn-rate 3 deg/s). Opponent = wrapper target_bt on the autopilot backend (DLL BT abandoned after ic_s6 v1-v6: closed-DLL suicide dive in 64.5% of episodes, 0.17% real kills, PPO got no positive signal). Python BT: lead-pursuit attack + saddled-threat evade/jink, shoots via the symmetric damage model, altitude command clamped >=3000m so it CANNOT self-crash; difficulty dial = max_turn_rate_deg_s (3 here; ladder 3->5->8 then cone 8->4->2). Spawn = mastered rear saddle 500-900m (safe again, no dive trigger), own 260 m/s (anti-overshoot), 8deg cone, v15 exploit-free reward + v6 farm-safe dense tracking. prob 0.75 mixes 25% ic_s5 random-jink episodes so every batch contains winnable episodes (anti-collapse) and the jink skill is not forgotten. Seed = ic_s5_weave5_random_v1/bundle_000150. SUCCESS = real 'target destroyed' share climbs (end_condition_breakdown, NOT raw win_rate alone), WEZ_ep>0 vs BT episodes, win holds high on the 25% jink episodes. WATCH: ownship-destroyed share (BT gunnery is live -- if deaths dominate, lower turn rate to 2 or set evade_enabled false for a pure-pursuit bridge); v14 farm signature (reward up / win flat)."
