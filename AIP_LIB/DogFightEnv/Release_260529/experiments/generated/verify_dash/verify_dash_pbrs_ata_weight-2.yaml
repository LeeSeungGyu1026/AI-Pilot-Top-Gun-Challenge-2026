name: team_ppo_mlp_verify_dash_pbrs_ata_weight-2
script: train_rllib
output:
  name: team01
  tag: verify_dash_pbrs_ata_weight-2
env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 300.0
  episode_step_limit: 18000
env_config:
  step_ratio: 6
  initial_scenario:
    mode: ref_old_random
    legacy_use_random_scenario: true
    legacy_use_first_scenario_only: false
    legacy_scenario_indices:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    legacy_randomization:
      aircraft_radius_m: 100.0
      roll_deg: 5.0
      pitch_deg: 5.0
      heading_deg: 5.0
      shared_n_m: 4000.0
      shared_e_m: 4000.0
      shared_d_m: 4000.0
      target_distance_n_m: 300.0
      speed_mps: 50.0
      loiter_bank_deg_range:
      - 40.0
      - 70.0
  reward:
    win_reward: 150.0
    loss_reward: -150.0
    draw_reward: -20.0
    damage_dealt_scale: 30.0
    damage_taken_scale: 12.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    safety_ramp_start_m: 900.0
    safety_floor_m: 300.0
    low_altitude_penalty: 0.5
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
algo:
  name: ppo
  framework: torch
  lr: 0.0003
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 8192
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens:
    - 256
    - 256
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false
runtime:
  iterations: 2
  num_env_runners: 2
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  native_checkpoint_frequency: 0
dashboard:
  enabled: true
  logdir: artifacts/dashboard
policy_probe:
  enabled: false
  interval: 10
  steps: 4
  print: false
engagement_log:
  enabled: true
  interval: 1
  steps: 600
  episodes: 1
  print: false
notes: PPO + tgc26 custom obs + PBRS asymmetric reward + mixed initial geometry vs
  BT.
