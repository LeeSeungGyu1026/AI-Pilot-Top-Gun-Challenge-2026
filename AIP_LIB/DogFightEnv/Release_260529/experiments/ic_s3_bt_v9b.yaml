# IC curriculum S3 v9b — resume of v9 after a user-requested pause.
#
# v9 was paused (not killed for a design reason) at iter 12/150 per user
# request ("잠시 중지한 다음, 나중에 다시 이어가자"). No new experimental
# variable here -- same reward/env config as v9 (wez.angle_deg=2.0 real kill
# cone unchanged, wez_shaping_cone_deg=45 + wez_precision_bonus_min=30/
# max=60 continuous aim-precision shaping, damage_dealt_scale=60,
# damage_taken_scale=6, pursuit_dense_scale=0.2, max_engage_time=180s,
# 3600-4200m spawn). Only change: init_bundle now points at v9's own
# bundle_000010 (the last saved checkpoint before the pause) instead of
# v7's bundle_000030, so this continues from where v9 left off rather than
# restarting from scratch.
#
# Caveat (documented in AUTONOMOUS_RUN_LOG.md): the platform has no live
# pause/suspend -- this is a fresh optimizer state seeded from saved weights,
# not a true resume, so expect the same brief re-seed disruption (crash/
# reward dip then recovery) seen at every bundle-seeded restart in this line.
#
#   python scripts\run_experiment.py experiments\ic_s3_bt_v9b.yaml

name: ic_s3_bt_v9b
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v9b

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 180.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [3600.0, 4200.0]
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:
    enabled: true
    max_range_m: 7000.0
    grow_steps: 30
  target_weave:
    enabled: false
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    forced_ground_reward: 50.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 60.0
    damage_taken_scale: 6.0
    wez_entry_bonus: 20.0
    wez_shaping_cone_deg: 45.0
    wez_precision_bonus_min: 30.0
    wez_precision_bonus_max: 60.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.2
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.3
    rear_cone_reward_scale: 0.3
    critical_alt_margin_m: 100.0
    altitude_floor_penalty_scale: 25.0
    altitude_floor_penalty_exponent: 2.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Resume from v9's own last checkpoint (iter 10) before the pause, not v7.
  init_bundle: artifacts/models/team01/ic_s3_bt_v9/bundle_000010

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 1800
  episodes: 1
  print: false

notes: "IC S3 v9b: resume of v9 after a user-requested pause (stopped cleanly at iter 12/150). No new variable -- same config as v9, just init_bundle repointed to v9's own bundle_000010 instead of v7's bundle_000030."
