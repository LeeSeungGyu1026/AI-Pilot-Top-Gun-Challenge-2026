# Stage 1 reward line: survival/control only.
#
# This file uses student.my_reward_stage1_survival instead of overriding a
# shared reward table in YAML. Keep this stage focused: stay airborne, hold a
# sane altitude/speed envelope, and avoid learning dive/spin habits.
#
# Run:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\run_experiment.py experiments\tailchase_s1_survival_reward_sac_v1.yaml
# Analyze:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\analyze_tailchase_run.py tailchase_s1_survival_reward_sac_v1 --report artifacts\reports\team01\tailchase_s1_survival_reward_sac_v1\analysis.md

name: tailchase_s1_survival_reward_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s1_survival_reward_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage1_survival
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 75.0
  episode_step_limit: 4500

env_config:
  step_ratio: 6
  action_slew_limit: 0.10
  action_abs_limit: [0.45, 0.32, 0.32, 1.0]
  action_postprocess:
    enabled: true
    safety_filter:
      enabled: true
      floor_m: 3600.0
      safe_m: 5200.0
      pitch_up_gain: 0.28
      nose_down_deg: 8.0
      nose_down_pitch_gain: 0.22
      roll_level_gain: 0.28
      roll_ref_deg: 80.0
      min_throttle_action: 0.45
  offensive_saddle:
    enabled: true
    range_m: [800.0, 1300.0]
    aspect_deg: [0.0, 12.0]
    altitude_m: 7000.0
    target_speed_mps: 245.0
    own_speed_mps: 270.0
  range_discipline:
    enabled: true
    max_range_m: 3500.0
    grow_steps: 60
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4

algo:
  name: sac
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 50000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 80
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 1 reward line: survival/control only, SAC+tactical16 vs straight BT target, GPU path via train_rllib num_gpus=1."
