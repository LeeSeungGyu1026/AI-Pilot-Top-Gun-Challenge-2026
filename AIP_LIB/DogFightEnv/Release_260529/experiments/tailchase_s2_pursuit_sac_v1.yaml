# Stage 2: survive while pursuing.
#
# Start from Stage 1's final bundle after Stage 1 passes:
#   runtime.init_bundle: artifacts/models/team01/tailchase_s1_survival_sac_v1

name: tailchase_s2_pursuit_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s2_pursuit_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_table1
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 90.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  action_slew_limit: 0.12
  action_abs_limit: [0.52, 0.38, 0.38, 1.0]
  offensive_saddle:
    enabled: true
    range_m: [550.0, 1000.0]
    aspect_deg: [0.0, 12.0]
    altitude_m: 7000.0
    target_speed_mps: 245.0
    own_speed_mps: 295.0
  range_discipline:
    enabled: true
    max_range_m: 2600.0
    grow_steps: 30
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 140.0
    loss_reward: -170.0
    draw_reward: -100.0
    own_crash_penalty: -220.0
    target_crash_reward: -20.0
    guard_fail_penalty: -100.0
    survival_bonus: 0.01
    step_penalty: -0.0035
    adverse_angle_scale: 0.35
    track_angle_scale: 0.55
    relative_position_scale: 1.40
    closure_scale: 0.45
    gunsnap_blue_scale: 0.80
    gunsnap_red_scale: 0.20
    deck_scale: 0.70
    too_close_scale: 1.10
    damage_scale: 35.0
    altitude_target_m: 7000.0
    altitude_band_m: 2200.0
    safe_altitude_m: 3000.0
    altitude_hold_scale: 0.08
    low_altitude_guard_scale: 3.0
    attitude_envelope_guard_scale: 0.40
    pitch_envelope_ref_deg: 32.0
    roll_envelope_ref_deg: 105.0
    nose_down_guard_scale: 0.70
    nose_down_pitch_ref_deg: 22.0
    descent_rate_guard_scale: 0.45
    descent_rate_ref_mps: 70.0
    speed_penalty_scale: 0.06
    speed_target_kcas: 335.0
    speed_band_kcas: 200.0
    wez_band_scale: 0.80
    wez_band_center_m: 560.0
    wez_band_half_width_m: 390.0
    wez_nose_half_angle_deg: 9.0
    wez_hold_bonus: 0.25
    official_wez_aim_scale: 1.2
    official_wez_aim_half_angle_deg: 4.0
    precision_aim_scale: 0.8
    precision_aim_sigma_deg: 4.0
    precision_aim_power: 1.0

algo:
  name: sac
  framework: torch
  lr: 2.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 50000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 120
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s1_survival_sac_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false
  interval: 20
  steps: 4

engagement_log:
  enabled: false
  interval: 20
  steps: 900
  episodes: 1
  print: true

notes: "Stage 2 pursuit: maintain Stage 1 stability while increasing rear-cone, closure, WEZ-band, and track-angle shaping."
