# Stage 2 anchor reward: hold a rear saddle before trying to kill.
#
# This diagnostic run starts from the stable Stage 1 policy, reduces closure
# pressure, strengthens explicit tail-saddle reward, and uses a lower SAC LR so
# the policy does not drift away from survival while learning pursuit geometry.

name: tailchase_s2_anchor_reward_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s2_anchor_reward_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage2_anchor
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.12
  action_abs_limit: [0.52, 0.36, 0.40, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 7.0
      el_ref_deg: 5.0
      roll_gain: 0.30
      rudder_gain: 0.44
      pitch_gain: 0.26
      max_delta: 0.32
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 14.0
      roll_gain: 0.10
      pull_gain: 0.04
    range_assist:
      enabled: true
      target_m: 820.0
      band_m: 420.0
      throttle_gain: 0.32
      min_throttle_action: -0.25
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 3300.0
      safe_m: 4800.0
      pitch_up_gain: 0.36
      nose_down_deg: 7.0
      nose_down_pitch_gain: 0.28
      roll_level_gain: 0.30
      roll_ref_deg: 82.0
      min_throttle_action: 0.52
  offensive_saddle:
    enabled: true
    range_m: [700.0, 1100.0]
    aspect_deg: [0.0, 6.0]
    altitude_m: 7200.0
    target_speed_mps: 250.0
    own_speed_mps: 258.0
  range_discipline:
    enabled: true
    max_range_m: 3800.0
    grow_steps: 70
  wez:
    angle_deg: 10.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    altitude_target_m: 7200.0
    altitude_band_m: 2400.0
    safe_altitude_m: 4000.0
    altitude_hold_scale: 0.18
    low_altitude_guard_scale: 5.0
    nose_down_guard_scale: 1.6
    descent_rate_guard_scale: 1.2
    track_angle_scale: 1.10
    relative_position_scale: 2.20
    closure_scale: 0.35
    gunsnap_blue_scale: 0.80
    too_close_scale: 1.80
    damage_scale: 15.0
    wez_band_scale: 1.80
    wez_band_center_m: 820.0
    wez_band_half_width_m: 520.0
    wez_nose_half_angle_deg: 16.0
    wez_hold_bonus: 0.70
    official_wez_aim_scale: 2.20
    official_wez_aim_half_angle_deg: 12.0
    precision_aim_scale: 0.90
    precision_aim_sigma_deg: 9.0
    anchor_range_center_m: 820.0
    anchor_range_half_width_m: 520.0
    anchor_nose_sigma_deg: 16.0
    anchor_rear_min_deg: 118.0
    anchor_nose_scale: 1.60
    anchor_rear_scale: 1.30
    anchor_saddle_scale: 4.00
    anchor_terminal_scale: 24.0
    anchor_bad_geometry_scale: 0.80

algo:
  name: sac
  framework: torch
  lr: 1.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 70000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 80
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s1_survival_reward_sac_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 2 anchor diagnostic: stabilize rear saddle geometry with explicit tail-anchor reward before Stage 3 kill pressure."
