# BT-vs-BT replay/smoke experiment.
#
# This intentionally disables RL control for the ownship by overriding
# env_config.ownship_control_mode. Use it to inspect custom BT behavior for
# both aircraft, not as a meaningful RL training run.

name: bt_vs_bt_circle_horizontal
script: train_rllib

output:
  name: bt_vs_bt
  tag: circle_horizontal

env:
  observation_mode: tactical16
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Circle_Horizontal.xml
  max_engage_time: 60.0
  episode_step_limit: 3600

env_config:
  step_ratio: 6
  ownship_control_mode: behavior_tree
  ownship_behavior_dll: AIP_BASE_target_circle_debug.dll
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  action_slew_limit: 0.04
  action_abs_limit: [0.45, 0.35, 0.35, 1.0]

algo:
  name: sac
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 10000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 1
  num_env_runners: 1
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: false
  save_native_checkpoint: false

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 1
  steps: 3600
  episodes: 1
  print: true

notes: "BT-vs-BT custom Circle_Horizontal replay check; ownship and target both use behavior_tree."
