# ic_s8: COMPETITION-OFFICIAL engagement conditions vs the UNCAPPED Python BT.
#
# User directive 2026-07-05: train under real-match conditions — official
# 300s engagement time and the platform's competition mixed initial-condition
# set (ref_old scenario table 0-7: tail-chase / offset / crossing / defensive /
# head-to-tail at 8000-8500m, 250 m/s), with the BT's turn-rate governor
# OPENED (30 deg/s command slew = far above the ~8 deg/s airframe/autopilot
# plant limit, so the plant is the only cap).
#
# Spawns use the wrapper's official_spawn (replicates ref_old_random geometry
# + jitter + shared translation) instead of initial_scenario.mode=ref_old_random,
# because that mode force-switches target_mode to behavior_tree/loiter at every
# reset — which would bypass the Python BT and resurrect the suicide-diving DLL.
#
# ABORT CRITERION (user): if this is TOO EASY (win ~>=0.95 in the first watcher
# window), STOP the run — the Python BT lacks combat competence at official
# geometry, and the next task becomes BT reinforcement, not more training.
#
# Kept from ic_s7 (deliberately NOT official yet): 8-deg damage cone (true
# competition cone is 2 deg; narrow 8->4->2 as its own later stage), v15
# exploit-free reward + farm-safe dense tracking, damage_taken 3.0.

name: ic_s8_official_pybt_uncapped_v1
script: train_rllib

output:
  name: team01
  tag: ic_s8_official_pybt_uncapped_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.codex_reward_v15_wez_only
  target_mode: autopilot            # Python BT drives the autopilot; no BT DLL
  max_engage_time: 300.0            # OFFICIAL engagement time
  episode_step_limit: 3600

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: false                  # superseded by official_spawn
  official_spawn:                   # competition mixed IC set (see wrapper)
    enabled: true
    scenario_indices: [0, 1, 2, 3, 4, 5, 6, 7]
    aircraft_radius_m: 100.0
    roll_deg: 5.0
    pitch_deg: 5.0
    heading_deg: 5.0
    shared_n_m: 4000.0
    shared_e_m: 4000.0
    shared_d_m: 4000.0
    min_spawn_alt_m: 4000.0         # clamp the shared altitude shift's floor
  range_discipline:
    enabled: true
    max_range_m: 4500.0             # official spawns reach ~2200m + maneuvering room
    grow_steps: 30
  altitude_discipline:
    enabled: true
    floor_m: 1200.0
    sustain_steps: 5
  target_bt:
    enabled: true
    prob: 1.0                       # BT-only: this run doubles as the BT quality probe
    max_turn_rate_deg_s: 30.0       # UNCAPPED (plant saturates ~8 deg/s)
    max_climb_rate_mps: 40.0
    min_altitude_m: 3000.0
    max_altitude_m: 12000.0
    threat_range_m: 1500.0
    threat_rear_deg: 90.0
    threat_track_deg: 40.0
    evade_enabled: true
    break_angle_deg: 100.0
    jink_min_steps: 25
    jink_max_steps: 70
    evade_vertical_m: 500.0
    lead_time_s: 3.0
    speed_attack_mps: 260.0
    speed_evade_mps: 270.0
    command_lead_max_deg: 45.0
    mode_min_steps: 20
  target_weave:
    enabled: false                  # no jink mix: clean read on BT difficulty
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -8000.0           # official altitude band base
    speed_cmd: 250.0
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 220.0
    forced_ground_reward: 0.0
    loss_reward: -150.0
    draw_reward: -100.0
    damage_dealt_scale: 350.0
    damage_taken_scale: 3.0
    wez_entry_bonus: 0.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 0.0
    wez_precision_bonus_max: 0.0
    fast_kill_bonus_max: 110.0
    fast_kill_horizon_s: 300.0      # match official engagement time
    fast_kill_bonus_floor_frac: 0.2
    pbrs_gamma: 0.997
    pbrs_ata_weight: 4.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.15
    pursuit_half_angle_deg: 20.0
    pursuit_range_m: 1200.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.1
    rear_cone_reward_scale: 0.0
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0
    reward_output_scale: 0.05

algo:
  name: ppo
  framework: torch
  lr: 3.0e-5
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.08
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # ic_s7 BT1 champion: train 0.78 (noise-limited), held-out 30/30 deterministic
  # kills vs the 3 deg/s BT at 300s.
  init_bundle: artifacts/models/team01/ic_s7_pybt1_turn3_v1/bundle_000150

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 5
  steps: 1200
  episodes: 1
  print: false

notes: "ic_s8 OFFICIAL CONDITIONS (user directive 2026-07-05): 300s engagement, competition mixed IC set (official_spawn = ref_old scenario table 0-7 replicated in the wrapper so target_mode stays autopilot and the Python BT keeps control; ref_old_random itself force-switches to the suicide DLL), BT turn governor OPENED to 30 deg/s (plant-limited ~8), BT-only episodes (prob 1.0, no jink mix) so the run doubles as a BT-quality probe. Seed = ic_s7_pybt1_turn3_v1/bundle_000150. ABORT CRITERION: win ~>=0.95 in the first watcher window => BT lacks combat competence at official geometry -> STOP training, next task = BT reinforcement (per user). Kept non-official for now: 8deg cone (true 2deg comes later as its own narrowing stage). Wrapper additions this run: official_spawn placement + discipline terminals now PRINT episode-end lines (end_condition_breakdown no longer blind to wrapper losses)."
