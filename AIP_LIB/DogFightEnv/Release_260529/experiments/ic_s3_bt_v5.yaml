# IC curriculum S3 v5 — widen offensive_saddle.range_m, single new variable.
#
# v4's converged, fully-safe policy (crash_rate=0.000, loss_rate=0.000) still
# never achieved a single real kill (target destroyed) across the whole run.
# Root-caused via a real Tacview trace + range-sweep probes (see
# AUTONOMOUS_RUN_LOG.md "ic_s3_bt_v4" entry for full detail): the
# offensive_saddle spawn (RL locked on at the BT's six, 1100-1450m, aspect
# 0-30 deg) puts the BT in a geometry that triggers a sustained, near-vertical
# (pitch -75 to -89 deg) uncontrolled-looking dive from essentially tick 0 of
# EVERY episode, crashing it in ~4 seconds regardless of what the RL does --
# there is no engagement window at all, so the RL never had a chance to learn
# to press for a kill. A BT-side hardening (removed Task_RearThreatJink's
# intentional dive bias, raised recovery-altitude margins) did NOT fix this --
# verified empirically, byte-identical crash pattern with the fixed DLL.
# range-sweep probes (single episode + an 8-episode batch, same v4 bundle +
# fixed DLL) found the trigger disappears somewhere between 3400m and 3600m:
# 1100-1450 / 1600-2000 / 2000-2600 / 2800-3400 all still crash in ~4s;
# 3600-4500 ran full 900-step episodes with ACTUAL mutual damage exchanged in
# 2/8 episodes (own_hp/tgt_hp ~0.83-0.92) -- the first real gunnery seen in
# the whole S3 line.
#
# This is a bigger distribution shift than prior single-variable changes (the
# RL has never operated at this range -- all its tracking skill was learned
# at 1100-1450m), so this run may need more iterations to re-converge and/or
# show a temporary regression while it (re-)learns to close distance under
# BT threat, similar to the project's earlier widen-separation curriculum
# stages. Reward and BT DLL are otherwise unchanged from v4 (single variable
# = range_m).
#
#   python scripts\run_experiment.py experiments\ic_s3_bt_v5.yaml

name: ic_s3_bt_v5
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v5

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 90.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [3600.0, 4200.0]       # widened from [1100, 1450] -- see header for why
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:                 # keep the proven exploit-blocker / aggression pressure
    enabled: true
    # widened proportionally (was 2500 for a 1100-1450 spawn, ~1.7x the max spawn
    # distance; 4200*1.7~=7150). Only fires on 30 CONSECUTIVE opening steps beyond
    # this while already past it (see DogFightEnvWrapper._apply_range_discipline),
    # so it does not false-trigger at spawn even though 3600-4200 > the old 2500 --
    # widened anyway for margin so a legitimate intercept turn isn't penalized.
    max_range_m: 7000.0
    grow_steps: 30
  target_weave:
    enabled: false                  # inert vs BT anyway (only fires when target_mode==autopilot)
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:                 # inert under behavior_tree; kept for config completeness
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 8.0                  # keep WIDE shaping cone (narrowing collapsed the policy before)
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    forced_ground_reward: 50.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 30.0
    damage_taken_scale: 12.0
    wez_entry_bonus: 20.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.1
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.3
    rear_cone_reward_scale: 0.3
    critical_alt_margin_m: 100.0
    altitude_floor_penalty_scale: 25.0
    altitude_floor_penalty_exponent: 2.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150                    # bumped from 100: bigger distribution shift (never
                                      # trained at this range), give it more room to re-converge
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Seed from v4's own final bundle -- keep general flight/pursuit skill, only
  # the spawn range changes.
  init_bundle: artifacts/models/team01/ic_s3_bt_v4

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 900
  episodes: 1
  print: false

notes: "IC S3 v5: widen offensive_saddle.range_m 1100-1450 -> 3600-4200 (single new variable). Root-caused via Tacview trace + range sweep: the tight saddle spawn was making the BT enter a sustained near-vertical uncontrolled-looking dive from tick 0 of nearly every episode, crashing itself in ~4s before the RL could ever engage -- not a BT altitude-recovery-logic bug (verified: a BT-side hardening pass did not change the pattern at all)."
