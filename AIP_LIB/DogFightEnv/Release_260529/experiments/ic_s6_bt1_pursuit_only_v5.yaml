# ic_s6 BT curriculum, STAGE 1: pursuit-only BT (no defensive maneuvers).
#
# First BT stage with (a) the fixed init_bundle loader (bug #7) so seeding is
# REAL, and (b) a student-controlled BT difficulty ladder
# (student/bt_rules/Rule_BT_L1..L4). The June ic_s3_bt line failed because the
# FULL BT at close rear spawn suicide-dives from tick 0 (forced spawn out to
# 3600m+, destroying the mastered 500-900m gunnery). L1 removes every
# defensive/dive task (DefensiveBreak/RearThreatJink/LowYoYo), so the agent
# can fight a live, TURNING, SHOOTING opponent at the exact geometry it
# already masters.
#
# BEFORE LAUNCH (BT DLL reads the workspace-root rule file):
#   1. UPDATE init_bundle below to ic_s5_weave5_random_v1's FINAL bundle.
#   2. copy student\bt_rules\Rule_BT_L1_pursuit_only.xml Rule_forTraining.xml
#      (stock backup already saved: student\bt_rules\Rule_BT_L4_stock.xml)
#   3. PROBE: run 3 iterations, then tools\end_condition_breakdown.py on
#      train.log -- "target altitude below min" must NOT dominate (BT tick-0
#      suicide dive would mean L1 didn't remove the trigger; abort + diagnose).
#
#   python scripts\run_experiment.py experiments\ic_s6_bt1_pursuit_only_v1.yaml
#
# Gate to stage 2 (widen band, then L2 gentle defense): training win_rate
# holds >=0.8 AND run_eval (with --experiment-yaml THIS file AND
# --bt-rule-xml student/bt_rules/Rule_BT_L1_pursuit_only.xml
# --target-backend bt) >=0.7 -- the provider-path eval is the HELD-OUT BT
# control path (2026-06-19 train/eval mismatch lesson: always gate on both).

name: ic_s6_bt1_pursuit_only_v1
script: train_rllib

output:
  name: team01
  tag: ic_s6_bt1_pursuit_only_v5

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.codex_reward_v15_wez_only
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 120.0            # BT turns into us; kills take longer than vs autopilot
  episode_step_limit: 3600

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    # v3 CRITICAL CHANGE: spawn moved OUT to 3600-4200m. Replay autopsy of v2
    # (iter20, target CSV) proved the rear-saddle spawn is incompatible with a
    # REACTIVE BT even after the L1 nerf: with the agent locked on its six at
    # 500-900m the BT attempts a ~180deg reversal, rolls inverted (roll 125-166),
    # pulls into a sustained near-vertical dive (pitch -58 by step60, -88 by
    # step100) and rides 7000m into the ground by step 244 at 97% health --
    # ownship untouched. That is the June v4 close-range heading-reversal
    # pathology; L1 only DELAYED it (tick0 -> step20), did not prevent it. A
    # self-removing opponent cannot be beaten by RL. June v5 established the dive
    # trigger disappears past ~3600m (BT flies/fights normally, real mutual
    # damage), so BT stages must start here, NOT at the rear saddle.
    range_m: [3600.0, 4200.0]
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0         # initial only; BT manages its own energy after tick 0
    own_speed_mps: 300.0            # closure margin vs a turning target
  range_discipline:
    enabled: true
    max_range_m: 7000.0             # widened to match the 3600-4200 spawn (was 3500
                                    # for the close saddle) so a legit intercept
                                    # turn from 4200m is not falsely penalized;
                                    # fires only on 30 CONSECUTIVE opening steps.
    grow_steps: 30
  altitude_discipline:                # NEW in v2: end a dive-to-the-deck early.
    # v1 (no altitude terminal) reproduced the June BT wall: seeded from the
    # autopilot-weave champion, the agent pure-pursued the turning/diving BT
    # into the ground -- "ownship altitude below min" 87%->63%, ZERO kills over
    # 52 iters, entropy never converged. From a 7000m co-altitude spawn the
    # per-step altitude-floor reward only bites in the last few hundred metres,
    # far too late to arrest a committed dive, so PPO sees no reason to stay
    # high. This terminal makes "chasing the bandit down" an EARLY, salient,
    # credit-assignable LOSS -- the exact fix (on the vertical axis) that the
    # range-discipline terminal was for the horizontal "extend-to-a-draw" wall.
    enabled: true
    # v4 CHANGE: floor 2500 -> 1200. v3 replay autopsy (iter20 ownship CSV) showed
    # the agent engages CORRECTLY from 3600m -- closes 3822m->1157m, merges, then
    # enters a normal energy-bleeding DESCENDING turning fight (both aircraft lose
    # altitude, agent controlled at pitch -44..-60, NOT a death dive). The 2500m
    # floor terminated that legitimate fight mid-engagement (agent at 2502m, target
    # still alive at 3531m, dist 728m) as a -150 LOSS -> mean reward pinned ~-146,
    # WEZ~0, zero kills: the terminal fired on ~every episode so PPO got no
    # discriminating signal (same "terminal-on-100%-of-episodes = no gradient"
    # trap as v1). 1200m sits BELOW the BT's 1800m ClimbRecover floor, so the
    # agent can stay with the BT as it bottoms out and recovers (shot opportunity)
    # while 1200m is still a recoverable backstop against an actual crash.
    floor_m: 1200.0
    sustain_steps: 5                  # a touch more hysteresis so a brief hard-pull
                                      # dip through 1200m doesn't instantly end it.
  target_weave:
    enabled: false                  # inert vs BT (autopilot-only feature)
  target_autopilot:                 # inert under behavior_tree; config completeness
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    # v5 CHANGE: damage cone 2.0 -> 8.0 deg (single variable vs v4). v4 replay
    # (iter25) proved the agent CLOSES beautifully to the merge and the descending
    # fight -- it reached 231m (step688) and 66m (step774) range -- but dealt ZERO
    # damage (target_health stayed 1.0) and WEZ_ep was EXACTLY 0 for 25 iters,
    # entropy rising to 20+: the gunnery it mastered vs a predictable autopilot
    # does NOT pin the true 2deg cone on a reactive, jinking, diving BT, so there
    # is no damage gradient at all -> the policy diverges. Reopen the DAMAGE cone
    # to bootstrap tracking, exactly as the autopilot curriculum did (8->5->3->2);
    # 2.0 is a FINAL-stage width that assumes tracking is already easy (true only
    # vs the autopilot). This is NOT the farmable exploit v15 removed -- that was
    # the wez_precision_BONUS (reward for aim without a hit), still OFF here;
    # widening angle_deg widens the real damage model, so damage still requires
    # actually pointing at the target in range. Narrow 8->2 again in later BT
    # stages once kills are established. Symmetric: the L1 BT also gets the wider
    # cone, but the agent keeps the offensive start + damage_taken stays low (3.0).
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:                           # exploit-free v15 block, unchanged from the weave chain
    win_reward: 220.0
    forced_ground_reward: 0.0       # keep 0: no camping for BT self-crash (v3 lesson)
    loss_reward: -150.0
    draw_reward: -100.0
    damage_dealt_scale: 350.0
    damage_taken_scale: 3.0         # keep low first (v7 lesson: high taken-penalty => retreat);
                                    # raise toward 10-20 only AFTER kills are established
    wez_entry_bonus: 0.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 0.0
    wez_precision_bonus_max: 0.0
    fast_kill_bonus_max: 110.0
    fast_kill_horizon_s: 120.0      # match max_engage_time
    fast_kill_bonus_floor_frac: 0.2
    pbrs_gamma: 0.997
    pbrs_ata_weight: 4.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.0
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 2500.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.1
    rear_cone_reward_scale: 0.0
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0
    reward_output_scale: 0.05

algo:
  name: ppo
  framework: torch
  lr: 3.0e-5                        # fine-tune settings that carried the whole weave chain;
  gamma: 0.997                      # if win_rate stalls <0.3 past iter ~60, consider lr 1e-4
  gae_lambda: 0.95                  # for one continuation run
  clip_param: 0.08
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 150
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # ic_s5_weave5_random_v1 FINAL bundle (run DONE exit=0, 150/150; final episodes
  # all "target destroyed" at 57-161 steps -- fully converged vs the random jinker).
  init_bundle: artifacts/models/team01/ic_s5_weave5_random_v1/bundle_000150

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 5
  steps: 1200
  episodes: 1
  print: false

notes: "ic_s6 BT STAGE 1 v5: WEZ damage cone 2.0 -> 8.0 deg (single variable vs v4). v4 (floor 1200) replay (iter25) proved the agent CLOSES + fights correctly -- reached 231m (step688) and 66m (step774) range in a descending turning fight -- but dealt ZERO damage (target_health 1.0 throughout), WEZ_ep EXACTLY 0 for 25 iters, entropy rising to 20+: the 2deg-cone gunnery it mastered vs a predictable autopilot does NOT pin onto a reactive/jinking/diving BT, so there is NO damage gradient and the policy diverges. v5 reopens the DAMAGE cone (8deg, the autopilot-curriculum bootstrap width) so rough tracking earns REAL damage -> a gradient toward gun-solutions vs the BT; narrow 8->2 in later stages once kills exist. NOT the v15 exploit (that was the wez_precision_BONUS = reward for aim w/o a hit, still OFF); widening angle_deg widens the real damage model only. Also note the L1 BT still eventually dives to the deck under close pressure (v4 replay: target 532m@step774), so a wider cone should let the kill LAND earlier/higher before the BT self-crashes. Everything else = v4 (spawn 3600-4200, L1, floor 1200, seed ic_s5 champion). SUCCESS = target_destroyed kills appear + WEZ_ep>0 + reward climbs off -140. If STILL 0 damage at 8deg, the problem is closure-timing not cone width -> re-autopsy. --- HISTORY: v4: altitude_discipline floor 2500 -> 1200 (single variable vs v3). v3 (spawn 3600-4200, floor 2500) PASSED the probe gate -- the BT no longer suicides (target-alt-below-min collapsed ~100%(v2) -> ~17%, mostly max-time-out now) -- but scored 0 kills, WEZ~0, mean reward pinned ~-146. Replay autopsy (iter20 ownship CSV) showed the agent engages CORRECTLY: closes 3822m->1157m, merges, then enters a normal energy-bleeding descending turning fight (controlled, pitch -44..-60, NOT a death dive), and the 2500m floor terminated that LEGIT fight mid-engagement (agent 2502m / target alive 3531m / dist 728m) as a -150 loss. Because the floor fired on ~every episode, PPO got no discriminating signal (the v1 'terminal on 100% = no gradient' trap, on the vertical axis). v4 lowers the floor below the BT's 1800m recovery so descending fights can play out and produce kills (positive gradient) while still backstopping a true crash. Everything else unchanged: spawn 3600-4200, L1 BT, v15 reward, range_discipline max 7000, seed = ic_s5 champion (v3 confirmed the champion closes fine from 3600m in 1 iter, so re-seed clean rather than inherit v3's floor-avoidance). Watch: real 'target destroyed' kills MUST appear and WEZ_ep go >0; if fights still bottom out at 1200m with no kills, the agent needs vertical/energy tactics -> next lever is raising spawn altitude (more headroom) or an energy-keeping shaping term, NOT raising the floor again. --- HISTORY (v1->v3): spawn moved OUT to 3600-4200m after a replay autopsy proved the rear saddle is fundamentally incompatible with a reactive BT. v1 (rear saddle, no alt terminal): agent dive-chased the BT into the ground, 0 kills/52 iters. v2 (rear saddle + altitude_discipline): the agent's OWN crash was cured (ownship-crash gone) but ~100% of episodes ended in the BT SELF-CRASHING at a consistent ~244 steps, 0 kills, reward pinned ~-135. Replay autopsy (iter20 target CSV): the L1 BT, with the agent locked on its six at 500-900m, attempts a ~180deg reversal, rolls inverted (roll 125-166 deg) and pulls into a sustained near-vertical dive (pitch -58@step60, -88@step100), riding 7000m into the ground by step244 at 97% health, ownship untouched. Identical to the June v4 close-range heading-reversal pathology; the L1 nerf only delayed it (tick0->step20), did not prevent it. CONCLUSION: a self-removing opponent cannot be beaten by RL, and the offensive-saddle bootstrap (great for a non-reacting autopilot) breaks against any reactive BT at close range. FIX: use June's proven BT-survivable spawn (>=3600m: dive trigger gone, BT flies/fights normally, real mutual damage), now combined with everything June lacked -- fixed init_bundle loader (real seeding), L1-nerfed BT, exploit-free v15 reward, AND the altitude_discipline terminal that stops the agent's own dive-chase while closing. Keep altitude_discipline (floor 2500, sustain 3) + range_discipline (max 7000). Seed = ic_s5_weave5_random_v1 final. PROBE 3 iters first: target-alt-below-min must collapse from ~100% (the BT should now survive to fight); watch for real 'target destroyed' kills and ownship-crash ~0. If the agent stands off at 3600m without closing (the June v5-v7 standoff attractor), the next lever is closure pressure / longer episodes, NOT another geometry change. Ladder revised: BT stages all spawn >=3600m; difficulty climbs via BT level L1->L4 and narrowing aspect, NOT by moving the agent to the BT's six. See experiments/BT_CURRICULUM_PLAN.md."
