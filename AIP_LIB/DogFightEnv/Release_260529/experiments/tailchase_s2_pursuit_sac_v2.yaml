# Stage 2 v2: assisted pursuit bridge.
#
# v1 survived but failed pursuit geometry (final ATA stayed around 132 deg).
# This run keeps SAC+tactical16 and the straight BT target, but adds a small
# YAML-controlled action_postprocess bridge matching the team notes:
# LOS assist + range throttle + bank/safety filters. The WEZ cone is widened
# only for this bridge stage so the learner gets measurable aim/damage signal.

name: tailchase_s2_pursuit_sac_v2
script: train_rllib

output:
  name: team01
  tag: tailchase_s2_pursuit_sac_v2

env:
  observation_mode: tactical16
  reward_module: student.my_reward_table1
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.16
  action_abs_limit: [0.60, 0.45, 0.45, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 6.0
      el_ref_deg: 5.0
      roll_gain: 0.30
      rudder_gain: 0.42
      pitch_gain: 0.30
      max_delta: 0.35
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 12.0
      roll_gain: 0.10
      pull_gain: 0.04
    range_assist:
      enabled: true
      target_m: 660.0
      band_m: 340.0
      throttle_gain: 0.28
      min_throttle_action: -0.2
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 2600.0
      safe_m: 3800.0
      pitch_up_gain: 0.30
      nose_down_deg: 8.0
      nose_down_pitch_gain: 0.20
      roll_level_gain: 0.25
      roll_ref_deg: 85.0
      min_throttle_action: 0.45
  offensive_saddle:
    enabled: true
    range_m: [450.0, 750.0]
    aspect_deg: [0.0, 8.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 265.0
  range_discipline:
    enabled: true
    max_range_m: 3500.0
    grow_steps: 50
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 180.0
    loss_reward: -170.0
    draw_reward: -110.0
    own_crash_penalty: -240.0
    target_crash_reward: -20.0
    guard_fail_penalty: -100.0
    survival_bonus: 0.01
    step_penalty: -0.004
    adverse_angle_scale: 0.45
    track_angle_scale: 0.75
    relative_position_scale: 1.80
    closure_scale: 0.55
    gunsnap_blue_scale: 1.00
    gunsnap_red_scale: 0.10
    deck_scale: 0.70
    too_close_scale: 1.30
    damage_scale: 80.0
    altitude_target_m: 7000.0
    altitude_band_m: 2500.0
    safe_altitude_m: 3000.0
    altitude_hold_scale: 0.08
    low_altitude_guard_scale: 3.0
    attitude_envelope_guard_scale: 0.35
    pitch_envelope_ref_deg: 34.0
    roll_envelope_ref_deg: 110.0
    nose_down_guard_scale: 0.70
    nose_down_pitch_ref_deg: 22.0
    descent_rate_guard_scale: 0.45
    descent_rate_ref_mps: 70.0
    speed_penalty_scale: 0.05
    speed_target_kcas: 320.0
    speed_band_kcas: 210.0
    wez_band_scale: 1.50
    wez_band_center_m: 610.0
    wez_band_half_width_m: 410.0
    wez_nose_half_angle_deg: 14.0
    wez_hold_bonus: 0.60
    official_wez_aim_scale: 2.00
    official_wez_aim_half_angle_deg: 10.0
    precision_aim_scale: 1.20
    precision_aim_sigma_deg: 8.0
    precision_aim_power: 1.0

algo:
  name: sac
  framework: torch
  lr: 2.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 50000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 120
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s2_pursuit_sac_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 2 v2 assisted pursuit bridge: SAC/tactical16 vs straight BT with LOS/range/bank/safety action_postprocess and widened training WEZ."
