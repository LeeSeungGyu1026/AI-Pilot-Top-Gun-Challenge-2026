# v15: kill-aligned reward, exploit stripped (from v14 bundle_000020, win 0.84).
#
# Why: v14 (loader fix) trained a real kill policy but win_rate PEAKED at 0.94
# (iter22) then fell to 0.67-0.71 while reward_mean kept rising -- the pursuit
# shaping slot climbed 154->195 as the agent farmed a non-lethal reward stream
# that dwarfed win_reward. Two farmable terms caused it, both folded into the
# platform "pursuit" slot: (1) rear_cone_reward (sit behind target, no shot);
# (2) the wide-90deg wez_precision_bonus (rough aim in the WEZ range band, no
# real hit -- true kill cone is 2deg). v15 zeroes both plus pursuit_dense and
# wez_entry, so the ATTACK reward is real WEZ damage ONLY. Kept: un-farmable
# PBRS closure + altitude safety, front-cone defensive penalty, terminal win +
# fast-kill. Seed = highest-win saved checkpoint (v14 bundle_000020, has critic).

name: ic_s3_v15_wez_only_v1
script: train_rllib

output:
  name: team01
  tag: ic_s3_v15_wez_only_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.codex_reward_v15_wez_only
  target_mode: autopilot
  max_engage_time: 90.0
  episode_step_limit: 2700

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [500.0, 850.0]
    aspect_deg: [0.0, 14.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 260.0
  range_discipline:
    enabled: true
    max_range_m: 3500.0
    grow_steps: 30
  target_weave:
    enabled: true
    amplitude_deg: 6.0
    period_steps: 180.0
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 220.0
    forced_ground_reward: 0.0
    loss_reward: -150.0
    draw_reward: -100.0
    damage_dealt_scale: 350.0
    damage_taken_scale: 3.0
    wez_entry_bonus: 0.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 0.0
    wez_precision_bonus_max: 0.0
    fast_kill_bonus_max: 110.0
    fast_kill_horizon_s: 90.0
    fast_kill_bonus_floor_frac: 0.2
    pbrs_gamma: 0.997
    pbrs_ata_weight: 4.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.0
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 2500.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.1
    rear_cone_reward_scale: 0.0
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0
    reward_output_scale: 0.05

algo:
  name: ppo
  framework: torch
  lr: 3.0e-5
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.08
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 100
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  init_bundle: artifacts/models/team01/ic_s3_v14_seedfix_rear_gunnery_v1/bundle_000020

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 5
  steps: 900
  episodes: 1
  print: false

notes: "v15 = kill-aligned reward, exploit stripped. v14 showed reward_mean climbing (pursuit 154->195) while win_rate FELL 0.84->0.71 and damage stayed flat ~17 -- the policy farmed a non-lethal shaping stream (>>win_reward). Removed the two farmable terms folded into the 'pursuit' slot: rear_cone_reward (loiter-behind-target) and the wide-90deg wez_precision_bonus (rough-aim-in-range without a real hit); also zeroed pursuit_dense and wez_entry. Attack reward now = real WEZ damage ONLY (true 2deg cone) + terminal win + fast-kill; kept un-farmable PBRS closure/altitude + front-cone defensive penalty. Seed v14 bundle_000020 (highest-win saved checkpoint 0.84, carries critic). 100 iters. Success signal: reward_mean and win_rate now MOVE TOGETHER (no reward-up/win-down divergence), win climbs past 0.84 toward ~1.0, ep_reward_pursuit collapses to ~0."
