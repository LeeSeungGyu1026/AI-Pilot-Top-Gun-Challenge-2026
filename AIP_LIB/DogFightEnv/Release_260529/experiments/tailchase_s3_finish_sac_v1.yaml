# Stage 3 finish continuation from the first deterministic kill-capable policy.
#
# Keep the action/postprocess profile from tailchase_s3_kill_from_anchor_sac_v1
# because stronger safety filtering caused deterministic altitude losses.
# Instead, use student.my_reward_stage3_finish to separate near-kill draws from
# poor draws by penalizing remaining target health at terminal time.

name: tailchase_s3_finish_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s3_finish_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage3_finish
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 100.0
  episode_step_limit: 6000

env_config:
  step_ratio: 6
  action_slew_limit: 0.11
  action_abs_limit: [0.50, 0.32, 0.40, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 6.0
      el_ref_deg: 5.0
      roll_gain: 0.28
      rudder_gain: 0.44
      pitch_gain: 0.14
      max_delta: 0.30
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 12.0
      roll_gain: 0.09
      pull_gain: 0.05
    range_assist:
      enabled: true
      target_m: 680.0
      band_m: 380.0
      throttle_gain: 0.30
      min_throttle_action: -0.15
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 3900.0
      safe_m: 5600.0
      pitch_up_gain: 0.52
      nose_down_deg: 5.0
      nose_down_pitch_gain: 0.42
      roll_level_gain: 0.38
      roll_ref_deg: 80.0
      min_throttle_action: 0.60
  offensive_saddle:
    enabled: true
    range_m: [500.0, 820.0]
    aspect_deg: [0.0, 7.0]
    altitude_m: 7400.0
    target_speed_mps: 250.0
    own_speed_mps: 264.0
  range_discipline:
    enabled: true
    max_range_m: 3400.0
    grow_steps: 50
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 390.0
    loss_reward: -260.0
    draw_reward: -90.0
    own_crash_penalty: -440.0
    target_crash_reward: -20.0
    survival_bonus: 0.004
    step_penalty: -0.004
    altitude_target_m: 7400.0
    altitude_band_m: 2400.0
    safe_altitude_m: 4300.0
    altitude_hold_scale: 0.20
    low_altitude_guard_scale: 5.5
    attitude_envelope_guard_scale: 0.65
    pitch_envelope_ref_deg: 26.0
    roll_envelope_ref_deg: 85.0
    nose_down_guard_scale: 1.8
    nose_down_pitch_ref_deg: 13.0
    descent_rate_guard_scale: 1.4
    descent_rate_ref_mps: 42.0
    action_pitch_down_guard_scale: 1.4
    action_pitch_guard_scale: 0.15
    action_roll_guard_scale: 0.15
    action_roll_global_guard_scale: 0.03
    track_angle_scale: 0.85
    relative_position_scale: 1.50
    closure_scale: 0.35
    gunsnap_blue_scale: 1.70
    gunsnap_red_scale: 0.10
    too_close_scale: 1.70
    damage_scale: 260.0
    wez_band_scale: 1.20
    wez_band_center_m: 650.0
    wez_band_half_width_m: 400.0
    wez_nose_half_angle_deg: 10.0
    wez_hold_bonus: 1.10
    official_wez_aim_scale: 4.20
    official_wez_aim_half_angle_deg: 8.0
    precision_aim_scale: 2.70
    precision_aim_sigma_deg: 5.5
    precision_aim_power: 1.0
    target_health_remaining_penalty_scale: 180.0
    fast_kill_bonus_scale: 90.0
    finish_max_time_s: 100.0

algo:
  name: sac
  framework: torch
  lr: 4.0e-5
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 90000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 40
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s3_kill_from_anchor_sac_v1/bundle_000060

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 3 finish reward: continue b060 with original action profile, penalize remaining target health on non-kill terminal states, and reward fast kills."
