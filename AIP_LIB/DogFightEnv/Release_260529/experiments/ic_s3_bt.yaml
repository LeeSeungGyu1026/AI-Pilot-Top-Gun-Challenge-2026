# IC curriculum S3 — OPPONENT SWAP: gentle weave -> behavior-tree (BT) opponent.
#
# Separation curriculum is complete: the agent masters the +/-20deg LEVEL weave across
# 600-1450 m (covers the ~1400 m competition spawn), ~0.7-1.0 win. But a diagnostic eval
# vs the BT showed 0% win / 87% loss, ALL "ownship altitude below min": the agent
# pure-pursuits the BT's defensive DIVE into the ground (own & target HP both 1.0 at the
# crash). The level weave never used the vertical, so the agent never learned ground
# avoidance or to track a fully-maneuvering target.
#
# S3 swaps the opponent to the BT, seeded from the separation champion (sep1450_v1, which
# starts locked-on behind the target -> initial traction). The crash -> terminal loss_reward
# (-150) gives PPO the signal to learn NOT to follow the BT into the ground. Keep the offensive
# saddle (competition range) + range-discipline + reward as-is (one variable: the opponent).
# If it stays stuck crashing/0%, bridge with a vertical/diving intermediate or strengthen the
# altitude shaping (pbrs_alt_weight / safety_floor) rather than forcing a cold BT jump.
#
#   python scripts\run_experiment.py experiments\ic_s3_bt.yaml

name: ic_s3_bt
script: train_rllib

output:
  name: team01
  tag: ic_s3_bt_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.my_reward
  target_mode: behavior_tree        # the real competition adversary (maneuvers/evades in 3D)
  target_behavior_dll: AIP_BASE_target.dll
  max_engage_time: 90.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [1100.0, 1450.0]       # competition range; agent starts locked-on behind the BT
    aspect_deg: [0.0, 30.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 300.0
  range_discipline:                 # keep the proven exploit-blocker / aggression pressure
    enabled: true
    max_range_m: 2500.0
    grow_steps: 30
  target_weave:
    enabled: false                  # inert vs BT anyway (only fires when target_mode==autopilot)
    amplitude_deg: 20.0
    period_steps: 120.0
  target_autopilot:                 # inert under behavior_tree; kept for config completeness
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 8.0                  # keep WIDE shaping cone (narrowing collapsed the policy before)
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 150.0
    loss_reward: -150.0
    draw_reward: -150.0
    damage_dealt_scale: 30.0
    damage_taken_scale: 12.0
    wez_entry_bonus: 20.0
    pbrs_gamma: 0.997
    pbrs_ata_weight: 2.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0           # altitude potential: discourages low alt. If the agent keeps
    safety_floor_m: 300.0           # chasing the BT into the ground, BOOST this (and/or floor) in v2.
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.1
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 4000.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.2
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 100
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  # Seed from the separation champion (sep1450_v1: ~0.7-0.9 vs weave at competition range).
  init_bundle: artifacts/models/team01/ic_s2_sep1450_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 10
  steps: 900
  episodes: 1
  print: false

notes: "IC S3: opponent swap weave->BT at competition range, seeded from separation champion sep1450_v1."
