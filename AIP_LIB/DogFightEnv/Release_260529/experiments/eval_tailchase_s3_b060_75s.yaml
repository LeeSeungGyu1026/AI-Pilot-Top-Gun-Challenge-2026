# Eval-only config for the current best Stage 3 policy.
#
# Purpose: test whether tailchase_s3_kill_from_anchor_sac_v1/bundle_000060 is
# useful in its early engagement window. The original 100 s eval shows late
# altitude losses mostly after 800 steps; this 75 s eval keeps the same spawn
# and action profile but ends before that late failure regime.

env:
  observation_mode: tactical16
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 75.0
  episode_step_limit: 4500

env_config:
  step_ratio: 6
  action_slew_limit: 0.11
  action_abs_limit: [0.50, 0.32, 0.40, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 6.0
      el_ref_deg: 5.0
      roll_gain: 0.28
      rudder_gain: 0.44
      pitch_gain: 0.14
      max_delta: 0.30
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 12.0
      roll_gain: 0.09
      pull_gain: 0.05
    range_assist:
      enabled: true
      target_m: 680.0
      band_m: 380.0
      throttle_gain: 0.30
      min_throttle_action: -0.15
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 3900.0
      safe_m: 5600.0
      pitch_up_gain: 0.52
      nose_down_deg: 5.0
      nose_down_pitch_gain: 0.42
      roll_level_gain: 0.38
      roll_ref_deg: 80.0
      min_throttle_action: 0.60
  offensive_saddle:
    enabled: true
    range_m: [500.0, 820.0]
    aspect_deg: [0.0, 7.0]
    altitude_m: 7400.0
    target_speed_mps: 250.0
    own_speed_mps: 264.0
  wez:
    angle_deg: 8.0
    min_range_m: 152.4
    max_range_m: 914.4
