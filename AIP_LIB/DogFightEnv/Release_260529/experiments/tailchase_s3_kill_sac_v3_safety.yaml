# Stage 3 v3: safety repair from the best v2 checkpoint.
#
# Stage 3 v2 produced real wins, but eval showed ownship-altitude losses.
# Seed from bundle_000080 (best quick-eval candidate) and keep the 6 deg cone,
# but make safety intervene much earlier and reduce pitch-down/turn assist.

name: tailchase_s3_kill_sac_v3_safety
script: train_rllib

output:
  name: team01
  tag: tailchase_s3_kill_sac_v3_safety

env:
  observation_mode: tactical16
  reward_module: student.my_reward_table1
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.12
  action_abs_limit: [0.50, 0.34, 0.38, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 5.0
      el_ref_deg: 6.0
      roll_gain: 0.24
      rudder_gain: 0.34
      pitch_gain: 0.12
      max_delta: 0.25
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 10.0
      roll_gain: 0.05
      pull_gain: 0.0
    range_assist:
      enabled: true
      target_m: 650.0
      band_m: 340.0
      throttle_gain: 0.22
      min_throttle_action: 0.0
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 4300.0
      safe_m: 6600.0
      pitch_up_gain: 0.75
      nose_down_deg: 3.0
      nose_down_pitch_gain: 0.55
      roll_level_gain: 0.50
      roll_ref_deg: 70.0
      min_throttle_action: 0.70
  offensive_saddle:
    enabled: true
    range_m: [480.0, 780.0]
    aspect_deg: [0.0, 7.0]
    altitude_m: 7600.0
    target_speed_mps: 250.0
    own_speed_mps: 260.0
  range_discipline:
    enabled: true
    max_range_m: 3300.0
    grow_steps: 45
  wez:
    angle_deg: 6.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 280.0
    loss_reward: -220.0
    draw_reward: -120.0
    own_crash_penalty: -520.0
    target_crash_reward: -20.0
    guard_fail_penalty: -140.0
    survival_bonus: 0.005
    step_penalty: -0.004
    adverse_angle_scale: 0.40
    track_angle_scale: 0.75
    relative_position_scale: 1.60
    closure_scale: 0.40
    gunsnap_blue_scale: 1.20
    gunsnap_red_scale: 0.10
    deck_scale: 0.80
    too_close_scale: 1.70
    damage_scale: 140.0
    altitude_target_m: 7600.0
    altitude_band_m: 2200.0
    safe_altitude_m: 5200.0
    altitude_hold_scale: 0.20
    low_altitude_guard_scale: 9.0
    attitude_envelope_guard_scale: 0.60
    pitch_envelope_ref_deg: 26.0
    roll_envelope_ref_deg: 85.0
    nose_down_guard_scale: 2.00
    nose_down_pitch_ref_deg: 12.0
    descent_rate_guard_scale: 1.60
    descent_rate_ref_mps: 38.0
    speed_penalty_scale: 0.05
    speed_target_kcas: 315.0
    speed_band_kcas: 210.0
    wez_band_scale: 1.00
    wez_band_center_m: 600.0
    wez_band_half_width_m: 380.0
    wez_nose_half_angle_deg: 10.0
    wez_hold_bonus: 0.70
    official_wez_aim_scale: 2.60
    official_wez_aim_half_angle_deg: 7.0
    precision_aim_scale: 1.50
    precision_aim_sigma_deg: 6.0
    precision_aim_power: 1.0

algo:
  name: sac
  framework: torch
  lr: 1.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 70000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 80
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s3_kill_sac_v2/bundle_000080

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 3 v3 safety repair: seed from S3 v2 bundle_000080, preserve 6-deg kill ability, suppress ownship altitude losses."
