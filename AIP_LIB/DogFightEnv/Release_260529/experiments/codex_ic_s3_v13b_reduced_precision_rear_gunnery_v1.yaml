# v13b: reduced-precision reward branch from the best frozen-eval v12b seed.
#
# Evidence after v13:
# - v13 loaded bundle_000110 correctly, but frozen deterministic eval showed it
#   was not a stable kill policy.
# - v12b bundle_000090 was the best small-sample candidate: deterministic 1/10,
#   stochastic 4/10 real kills under the same rear-spawn/autopilot/weave eval.
# - v13b keeps a small precision gradient instead of removing it entirely, caps
#   WEZ precision farming payoff far below kill value, and keeps fast-kill bonus.
#
# Preflight before training:
#   python scripts\codex_bundle_restore_autopsy.py --experiment-yaml experiments\codex_ic_s3_v13b_reduced_precision_rear_gunnery_v1.yaml --bundle artifacts\models\team01\codex_ic_s3_v12b_level_rear_randomized_300_v1\bundle_000090 --output-json reports\codex_v13b_restore_autopsy_20260704.json
#   python scripts\codex_pre_v12_diagnostics.py --eval-name codex_v13b_seed_bundle090_preflight_det_10_numpy_v1 --episodes 10 --ownship-bundle-dir artifacts\models\team01\codex_ic_s3_v12b_level_rear_randomized_300_v1\bundle_000090 --target-backend autopilot --observation-mode custom --observation-module student.my_observation --experiment-yaml experiments\codex_ic_s3_v13b_reduced_precision_rear_gunnery_v1.yaml --max-engage-time 90 --episode-step-limit 2700 --sample-stride 120 --numpy-inference
#   python scripts\codex_pre_v12_diagnostics.py --eval-name codex_v13b_seed_bundle090_preflight_stoch_10_numpy_v1 --episodes 10 --ownship-bundle-dir artifacts\models\team01\codex_ic_s3_v12b_level_rear_randomized_300_v1\bundle_000090 --target-backend autopilot --observation-mode custom --observation-module student.my_observation --experiment-yaml experiments\codex_ic_s3_v13b_reduced_precision_rear_gunnery_v1.yaml --max-engage-time 90 --episode-step-limit 2700 --sample-stride 120 --numpy-inference --explore

name: codex_ic_s3_v13b_reduced_precision_rear_gunnery_v1
script: train_rllib

output:
  name: team01
  tag: codex_ic_s3_v13b_reduced_precision_rear_gunnery_v1

env:
  observation_mode: custom
  observation_module: student.my_observation
  reward_module: student.codex_reward_v13b
  target_mode: autopilot
  max_engage_time: 90.0
  episode_step_limit: 2700

env_config:
  step_ratio: 6
  observation_size: 26
  action_slew_limit: 0.25
  offensive_saddle:
    enabled: true
    range_m: [500.0, 850.0]
    aspect_deg: [0.0, 14.0]
    altitude_m: 7000.0
    target_speed_mps: 250.0
    own_speed_mps: 260.0
  range_discipline:
    enabled: true
    max_range_m: 3500.0
    grow_steps: 30
  target_weave:
    enabled: true
    amplitude_deg: 6.0
    period_steps: 180.0
  target_autopilot:
    heading_cmd: 0.0
    altitude_cmd: -7000.0
    speed_cmd: 250.0
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 220.0
    forced_ground_reward: 0.0
    loss_reward: -150.0
    draw_reward: -100.0
    damage_dealt_scale: 350.0
    damage_taken_scale: 3.0
    wez_entry_bonus: 20.0
    wez_shaping_cone_deg: 90.0
    wez_precision_bonus_min: 0.2
    wez_precision_bonus_max: 10.0
    fast_kill_bonus_max: 110.0
    fast_kill_horizon_s: 90.0
    fast_kill_bonus_floor_frac: 0.2
    pbrs_gamma: 0.997
    pbrs_ata_weight: 4.0
    pbrs_range_weight: 1.0
    pbrs_range_log_clip: 3.0
    pbrs_alt_weight: 10.0
    safety_floor_m: 300.0
    safety_safe_m: 900.0
    pursuit_dense_scale: 0.2
    pursuit_half_angle_deg: 45.0
    pursuit_range_m: 2500.0
    step_penalty: -0.005
    survival_bonus: 0.0
    damage_scale: 0.0
    low_altitude_penalty: 0.0
    aspect_cone_deg: 30.0
    front_cone_penalty_scale: 0.1
    rear_cone_reward_scale: 0.15
    critical_alt_margin_m: 300.0
    altitude_floor_penalty_min: 1.0
    altitude_floor_penalty_max: 1000.0
    reward_output_scale: 0.05

algo:
  name: ppo
  framework: torch
  lr: 3.0e-5
  gamma: 0.997
  gae_lambda: 0.95
  clip_param: 0.08
  train_batch_size: 16384
  minibatch_size: 512
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: tanh
    head_fcnet_hiddens: []
    head_fcnet_activation: tanh
    vf_share_layers: false

runtime:
  iterations: 60
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: false
  init_bundle: artifacts/models/team01/codex_ic_s3_v12b_level_rear_randomized_300_v1/bundle_000090

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: true
  interval: 5
  steps: 900
  episodes: 1
  print: false

notes: "codex v13b branch from v12b bundle_000090. Keeps a reduced WEZ precision gradient (max 10 instead of 100), adds fast-kill floor, and lowers PPO lr/clip. Goal: convert stochastic kill potential into deterministic kill behavior without restoring v12b aim-farming."
