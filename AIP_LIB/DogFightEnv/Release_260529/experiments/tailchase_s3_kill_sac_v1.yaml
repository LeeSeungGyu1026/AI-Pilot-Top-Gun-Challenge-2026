# Stage 3: survive, pursue, reduce target health.
#
# Start from Stage 2's final bundle after Stage 2 passes:
#   runtime.init_bundle: artifacts/models/team01/tailchase_s2_pursuit_sac_v1

name: tailchase_s3_kill_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s3_kill_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_table1
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 90.0
  episode_step_limit: 5400

env_config:
  step_ratio: 6
  action_slew_limit: 0.14
  action_abs_limit: [0.58, 0.42, 0.42, 1.0]
  offensive_saddle:
    enabled: true
    range_m: [450.0, 850.0]
    aspect_deg: [0.0, 12.0]
    altitude_m: 7000.0
    target_speed_mps: 245.0
    own_speed_mps: 300.0
  range_discipline:
    enabled: true
    max_range_m: 2400.0
    grow_steps: 30
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  reward:
    win_reward: 260.0
    loss_reward: -170.0
    draw_reward: -120.0
    own_crash_penalty: -220.0
    target_crash_reward: -20.0
    guard_fail_penalty: -100.0
    survival_bonus: 0.0
    step_penalty: -0.004
    adverse_angle_scale: 0.35
    track_angle_scale: 0.60
    relative_position_scale: 1.30
    closure_scale: 0.35
    gunsnap_blue_scale: 1.80
    gunsnap_red_scale: 0.20
    deck_scale: 0.70
    too_close_scale: 1.20
    damage_scale: 120.0
    altitude_target_m: 7000.0
    altitude_band_m: 2500.0
    safe_altitude_m: 2800.0
    altitude_hold_scale: 0.06
    low_altitude_guard_scale: 2.5
    attitude_envelope_guard_scale: 0.35
    pitch_envelope_ref_deg: 34.0
    roll_envelope_ref_deg: 110.0
    nose_down_guard_scale: 0.60
    nose_down_pitch_ref_deg: 24.0
    descent_rate_guard_scale: 0.35
    descent_rate_ref_mps: 75.0
    speed_penalty_scale: 0.05
    speed_target_kcas: 335.0
    speed_band_kcas: 210.0
    wez_band_scale: 0.80
    wez_band_center_m: 520.0
    wez_band_half_width_m: 380.0
    wez_nose_half_angle_deg: 7.0
    wez_hold_bonus: 0.60
    official_wez_aim_scale: 4.0
    official_wez_aim_half_angle_deg: 3.0
    precision_aim_scale: 2.5
    precision_aim_sigma_deg: 2.5
    precision_aim_power: 1.0

algo:
  name: sac
  framework: torch
  lr: 1.5e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 70000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 160
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s2_pursuit_sac_v1

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false
  interval: 20
  steps: 4

engagement_log:
  enabled: false
  interval: 20
  steps: 900
  episodes: 1
  print: true

notes: "Stage 3 kill: keep stability/pursuit while increasing official WEZ, precision aim, gunsnap, and damage pressure."
