# Stage 3 reward line: finish with target health zero.
#
# Continue from Stage 2. This stage raises damage and terminal pressure, narrows
# the aiming terms, and keeps altitude/speed guards strong enough to avoid the
# dive-to-kill failure mode seen in recent Stage 3 attempts.
#
# Run:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\run_experiment.py experiments\tailchase_s3_kill_reward_sac_v1.yaml
# Analyze:
#   C:\Users\biobe\miniconda3\envs\aip\python.exe scripts\analyze_tailchase_run.py tailchase_s3_kill_reward_sac_v1 --report artifacts\reports\team01\tailchase_s3_kill_reward_sac_v1\analysis.md

name: tailchase_s3_kill_reward_sac_v1
script: train_rllib

output:
  name: team01
  tag: tailchase_s3_kill_reward_sac_v1

env:
  observation_mode: tactical16
  reward_module: student.my_reward_stage3_kill
  target_mode: behavior_tree
  target_behavior_dll: AIP_BASE_target_circle_debug.dll
  bt_rule_xml: ..\..\Rule_Straight.xml
  max_engage_time: 120.0
  episode_step_limit: 7200

env_config:
  step_ratio: 6
  action_slew_limit: 0.14
  action_abs_limit: [0.56, 0.40, 0.42, 1.0]
  action_postprocess:
    enabled: true
    los_assist:
      enabled: true
      az_ref_deg: 5.0
      el_ref_deg: 5.0
      roll_gain: 0.28
      rudder_gain: 0.40
      pitch_gain: 0.20
      max_delta: 0.30
      roll_sign: 1.0
      rudder_sign: 1.0
      pitch_sign: -1.0
    bank_turn_assist:
      enabled: true
      disable_ata_deg: 0.0
      az_ref_deg: 10.0
      roll_gain: 0.08
      pull_gain: 0.03
    range_assist:
      enabled: true
      target_m: 600.0
      band_m: 320.0
      throttle_gain: 0.23
      min_throttle_action: -0.1
      max_throttle_action: 1.0
    safety_filter:
      enabled: true
      floor_m: 3300.0
      safe_m: 5000.0
      pitch_up_gain: 0.42
      nose_down_deg: 6.0
      nose_down_pitch_gain: 0.32
      roll_level_gain: 0.34
      roll_ref_deg: 80.0
      min_throttle_action: 0.55
  offensive_saddle:
    enabled: true
    range_m: [450.0, 760.0]
    aspect_deg: [0.0, 8.0]
    altitude_m: 7200.0
    target_speed_mps: 250.0
    own_speed_mps: 265.0
  range_discipline:
    enabled: true
    max_range_m: 3300.0
    grow_steps: 45
  wez:
    angle_deg: 6.0
    min_range_m: 152.4
    max_range_m: 914.4

algo:
  name: sac
  framework: torch
  lr: 1.5e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 70000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations: 140
  legacy_api_stack: true
  num_env_runners: 0
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 10
  save_native_checkpoint: true
  native_checkpoint_frequency: 40
  init_bundle: artifacts/models/team01/tailchase_s2_pursuit_reward_sac_v1/bundle_000010

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: false

engagement_log:
  enabled: false

notes: "Stage 3 reward line: continue Stage 2 reward policy, pursue stable rear WEZ and destroy target health without altitude collapse."
